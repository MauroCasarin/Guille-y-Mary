<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      #marco-app {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('assets/canvas.png'); 
        background-position: center; background-repeat: no-repeat; background-size: cover;
        z-index: 10; pointer-events: none; 
      }

      #btn-fullscreen {
        position: fixed; top: 20px; right: 20px;
        z-index: 20; width: 40px; height: 40px;
        background: rgba(255, 255, 255, 0.4); border-radius: 8px;
        border: 1px solid white; cursor: pointer;
        display: flex; justify-content: center; align-items: center; font-size: 20px;
      }
    </style>
  </head>
  <body>

    <div id="marco-app"></div>
    <button id="btn-fullscreen">⛶</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="superFloating" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               animation__fade="property: material.opacity; from: 0; to: 1; dur: 1000; easing: easeOutQuad"
               animation__move="property: position; to: 0 0 0.25; dur: 3000; easing: easeInOutSine; loop: true; dir: alternate"
               animation__tilt="property: rotation; from: -8 -8 -4; to: 8 8 4; dur: 4500; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0" id="target0"><a-image id="content0" src="#img1" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="target1"><a-image id="content1" src="#img2" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 2" id="target2"><a-image id="content2" src="#img3" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 3" id="target3"><a-image id="content3" src="#img4" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image></a-entity>

    </a-scene>

    <script>
      // Botón pantalla completa (sin login)
      const btnFull = document.getElementById('btn-fullscreen');
      btnFull.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          btnFull.innerHTML = "❌";
        } else {
          document.exitFullscreen();
          btnFull.innerHTML = "⛶";
        }
      });

      // Suavizado elástico (automático para todos)
      const smoothingFactor = 0.05; 
      for (let i = 0; i < 4; i++) {
        const target = document.querySelector(`#target${i}`);
        const content = document.querySelector(`#content${i}`);
        let currentPos = new THREE.Vector3();
        let isFound = false;
        target.addEventListener("targetFound", () => { isFound = true; });
        target.addEventListener("targetLost", () => { isFound = false; });
        content.addEventListener('componentchanged', function (evt) {
          if (!isFound) return;
          if (evt.detail.name !== 'position' && evt.detail.name !== 'rotation') return;
          currentPos.lerp(target.object3D.position, smoothingFactor);
          content.object3D.position.copy(currentPos);
          content.object3D.quaternion.slerp(target.object3D.quaternion, smoothingFactor);
        });
      }
    </script>
  </body>
</html>
