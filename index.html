<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      /* MARCO FIJO - AJUSTE TOTAL 100% 100% */
      #marco-app {
        position: fixed;
        top: 0; left: 0; 
        width: 100vw; height: 100vh; 
        background-image: url('assets/canvas.png'); 
        background-position: center center; 
        background-repeat: no-repeat; 
        background-size: 100% 100%; 
        z-index: 10; 
        pointer-events: none; 
      }

      #btn-fullscreen {
        position: fixed; top: 20px; right: 20px;
        z-index: 20; width: 40px; height: 40px;
        background: rgba(255, 255, 255, 0.3); border-radius: 50%;
        border: 1px solid white; color: white;
        display: flex; justify-content: center; align-items: center; font-size: 20px;
      }
    </style>
  </head>
  <body>

    <div id="marco-app"></div>
    <button id="btn-fullscreen">⛶</button>

    <script>
      // Chispas reactivas al movimiento del cel
      AFRAME.registerComponent('accelerometer-sparks', {
        init: function () {
          this.handleOrientation = this.handleOrientation.bind(this);
          window.addEventListener('deviceorientation', this.handleOrientation, true);
        },
        handleOrientation: function (event) {
          const tiltX = Math.max(-10, Math.min(10, event.beta / 8));
          const tiltY = Math.max(-10, Math.min(10, event.gamma / 8));
          this.el.setAttribute('rotation', { x: -tiltX, y: tiltY, z: 0 });
        }
      });
    </script>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.000001; filterBeta: 0.0001; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights, antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="imageStyle" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               animation__tilt="property: rotation; from: -5 -5 -2; to: 5 5 2; dur: 4000; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>

      <a-mixin id="spark" 
               geometry="primitive: sphere; radius: 0.007"
               material="color: #FFF; shader: flat; transparent: true; opacity: 0.4;"
               animation__pulse="property: material.opacity; from: 0.1; to: 0.5; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0" id="target0">
         <a-entity id="content0" position="0 0 0.1">
           <a-image src="#img1" mixin="imageStyle"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.4 0.4 0"></a-entity>
             <a-entity mixin="spark" position="-0.4 -0.4 0.05"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" id="target1">
         <a-entity id="content1" position="0 0 0.1">
           <a-image src="#img2" mixin="imageStyle"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.4 0.4 0.05"></a-entity>
             <a-entity mixin="spark" position="-0.3 -0.5 0"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" id="target2">
         <a-entity id="content2" position="0 0 0.1">
           <a-image src="#img3" mixin="imageStyle"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.5 0 0.05"></a-entity>
             <a-entity mixin="spark" position="-0.5 0 0"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" id="target3">
         <a-entity id="content3" position="0 0 0.1">
           <a-image src="#img4" mixin="imageStyle"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0 0.6 0"></a-entity>
             <a-entity mixin="spark" position="0 -0.6 0.05"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // Fullscreen
      const btnFull = document.getElementById('btn-fullscreen');
      btnFull.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          btnFull.innerHTML = "❌";
        } else {
          document.exitFullscreen();
          btnFull.innerHTML = "⛶";
        }
      });

      // --- CORRECCIÓN DE ESTABILIDAD Y FADE ---
      const smoothingFactor = 0.01; 

      for (let i = 0; i < 4; i++) {
        const target = document.querySelector(`#target${i}`);
        const content = document.querySelector(`#content${i}`);
        const image = content.querySelector('a-image');
        let currentPos = new THREE.Vector3();
        let isFound = false;

        target.addEventListener("targetFound", () => { 
          isFound = true; 
          // Fade In suave de opacidad
          image.setAttribute('animation__fade', {
            property: 'material.opacity', from: 0, to: 1, dur: 800, easing: 'easeOutQuad'
          });
        });

        target.addEventListener("targetLost", () => { 
          isFound = false; 
          // Fade Out inmediato para evitar que se vea el "salto" al perder el tracking
          image.setAttribute('animation__fade', {
            property: 'material.opacity', from: 1, to: 0, dur: 300, easing: 'easeInQuad'
          });
        });

        // Seguimiento Elástico (Cero tembleque)
        content.addEventListener('componentchanged', function (evt) {
          if (!isFound) return;
          if (evt.detail.name !== 'position' && evt.detail.name !== 'rotation') return;
          currentPos.lerp(target.object3D.position, smoothingFactor);
          content.object3D.position.copy(currentPos);
          content.object3D.quaternion.slerp(target.object3D.quaternion, smoothingFactor);
        });
      }
    </script>
  </body>
</html>
