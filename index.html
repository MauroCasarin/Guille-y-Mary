<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Forzar que el video de la cámara se vea detrás de la escena */
      #mindar-image-ui-scanning { display: none; }
    </style>
  </head>
  <body>
    
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.1; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-mixin id="imageStyle" 
               material="transparent: true; alphaTest: 0.5; shader: flat"
               animation__float="property: position; to: 0 0.05 0.15; dur: 1500; easing: easeInOutSine; loop: true; dir: alternate"
               animation__glow="property: material.opacity; from: 0.8; to: 1; dur: 500; easing: linear; loop: true; dir: alternate"></a-mixin>
      
      <a-mixin id="shadowStyle"
               geometry="primitive: plane; width: 0.8; height: 0.8"
               material="color: black; opacity: 0.3; transparent: true; shader: flat"
               rotation="-90 0 0" position="0 -0.1 0"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img1" position="0 0 0.1" width="1" height="1" mixin="imageStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img2" position="0 0 0.1" width="1" height="1" mixin="imageStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img3" position="0 0 0.1" width="1" height="1" mixin="imageStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img4" position="0 0 0.1" width="1" height="1" mixin="imageStyle"></a-image>
      </a-entity>

    </a-scene>
  </body>
</html>
