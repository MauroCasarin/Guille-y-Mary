<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen_3d_1.png">
        <img id="img2" src="assets/imagen_3d_2.png">
        <img id="img3" src="assets/imagen_3d_3.png">
        <img id="img4" src="assets/imagen_3d_4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#img1" position="0 0 0.1" rotation="0 0 0" width="1" height="1"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-image src="#img2" position="0 0 0.1" rotation="0 0 0" width="1" height="1"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-image src="#img3" position="0 0 0.1" rotation="0 0 0" width="1" height="1"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-image src="#img4" position="0 0 0.1" rotation="0 0 0" width="1" height="1"></a-image>
      </a-entity>

    </a-scene>
  </body>
</html>
