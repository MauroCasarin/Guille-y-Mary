<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: black; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      /* CAPA 1: El Video de Fondo (Chroma Key) */
      #video-container {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      
      #video-fondo {
        min-width: 100%;
        min-height: 100%;
        object-fit: cover;
        /* Filtro básico para ayudar a disimular el verde si no usas shader complejo */
        filter: contrast(1.1) brightness(1.1);
      }

      /* CAPA 2: El Marco canvas.png */
      #marco-app {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('assets/canvas.png'); 
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        z-index: 10; 
        pointer-events: none; 
      }

      /* BOTÓN PLAY MINI */
      #btn-play {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 20;
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        border: none;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>

    <div id="video-container">
        <video id="video-fondo" src="assets/Video-Para-RA.mp4" loop playsinline webkit-playsinline></video>
    </div>

    <div id="marco-app"></div>

    <button id="btn-play">▶️</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no; uiLoading: no;" 
      embedded
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights, alpha: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="superFloating" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               animation__fade="property: material.opacity; from: 0; to: 1; dur: 1000; easing: easeOutQuad"
               animation__move="property: position; to: 0 0 0.25; dur: 3000; easing: easeInOutSine; loop: true; dir: alternate"
               animation__tilt="property: rotation; from: -10 -10 -5; to: 10 10 5; dur: 4000; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0" id="target0">
         <a-image id="content0" src="#img1" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" id="target1">
         <a-image id="content1" src="#img2" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" id="target2">
         <a-image id="content2" src="#img3" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" id="target3">
         <a-image id="content3" src="#img4" position="0 0 0.05" width="1" height="1" mixin="superFloating"></a-image>
      </a-entity>

    </a-scene>

    <script>
      const videoFondo = document.querySelector("#video-fondo");
      const btnPlay = document.querySelector("#btn-play");

      // Lógica del botón Play
      btnPlay.addEventListener("click", () => {
        if (videoFondo.paused) {
          videoFondo.play();
          btnPlay.innerHTML = "⏸️";
        } else {
          videoFondo.pause();
          btnPlay.innerHTML = "▶️";
        }
      });

      // --- SUAVIZADO ELÁSTICO ---
      const smoothingFactor = 0.05; 
      for (let i = 0; i < 4; i++) {
        const target = document.querySelector(`#target${i}`);
        const content = document.querySelector(`#content${i}`);
        let currentPos = new THREE.Vector3();
        let isFound = false;

        target.addEventListener("targetFound", () => { isFound = true; });
        target.addEventListener("targetLost", () => { isFound = false; });

        content.addEventListener('componentchanged', function (evt) {
          if (!isFound) return;
          if (evt.detail.name !== 'position' && evt.detail.name !== 'rotation') return;
          currentPos.lerp(target.object3D.position, smoothingFactor);
          content.object3D.position.copy(currentPos);
          content.object3D.quaternion.slerp(target.object3D.quaternion, smoothingFactor);
        });
      }
    </script>
  </body>
</html>
