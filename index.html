<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Ocultar botones de la interfaz de A-Frame por CSS por si acaso */
      .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
  </head>
  <body>
    
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.1; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="hologramStyle" 
               rotation="90 0 0"
               material="transparent: true; alphaTest: 0.5; shader: flat"
               animation__float="property: position; to: 0 0.55 0.05; dur: 1500; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>
      
      <a-mixin id="shadowStyle"
               geometry="primitive: plane; width: 0.8; height: 0.2"
               material="color: black; opacity: 0.3; transparent: true; shader: flat"
               position="0 0 0"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img1" position="0 0.5 0" width="1" height="1" mixin="hologramStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img2" position="0 0.5 0" width="1" height="1" mixin="hologramStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img3" position="0 0.5 0" width="1" height="1" mixin="hologramStyle"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-plane mixin="shadowStyle"></a-plane>
        <a-image src="#img4" position="0 0.5 0" width="1" height="1" mixin="hologramStyle"></a-image>
      </a-entity>

    </a-scene>

    <script>
      // Forzar la eliminación del botón VR si A-Frame intenta crearlo
      window.addEventListener('load', () => {
        const scene = document.querySelector('a-scene');
        if (scene) {
          scene.setAttribute('vr-mode-ui', 'enabled', false);
        }
      });
    </script>
  </body>
</html>
