<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      /* MARCO FIJO canvas.png */
      #marco-app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('assets/canvas.png'); 
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        z-index: 10; 
        pointer-events: none; 
      }
    </style>
  </head>
  <body>

    <div id="marco-app"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.1; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="softFloating" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               animation__fade="property: material.opacity; from: 0; to: 1; dur: 1200; easing: easeOutQuad"
               animation__pop="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 1500; easing: easeOutExpo"
               animation__move="property: position; to: 0 0 0.2; dur: 3000; easing: easeInOutQuad; loop: true; dir: alternate"
               animation__tilt="property: rotation; from: -5 -5 -2; to: 5 5 2; dur: 4000; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0">
         <a-image src="#img1" position="0 0 0.1" width="1" height="1" mixin="softFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
         <a-image src="#img2" position="0 0 0.1" width="1" height="1" mixin="softFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
         <a-image src="#img3" position="0 0 0.1" width="1" height="1" mixin="softFloating"></a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
         <a-image src="#img4" position="0 0 0.1" width="1" height="1" mixin="softFloating"></a-image>
      </a-entity>

    </a-scene>

    <script>
      // Forzar desactivación de UI innecesaria al cargar
      document.querySelector('a-scene').addEventListener('loaded', function () {
        this.setAttribute('vr-mode-ui', 'enabled', false);
      });
    </script>
  </body>
</html>
