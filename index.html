<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      /* MARCO CON AUTO-ESCALADO FORZADO (STRETCH) - FIJO Y ESTABLE */
      #marco-app {
        position: fixed;
        top: 0; left: 0; 
        width: 100vw; 
        height: 100vh; 
        background-image: url('assets/canvas.png'); 
        background-position: center center; 
        background-repeat: no-repeat; 
        background-size: 100% 100%; 
        z-index: 10; 
        pointer-events: none; 
      }

      #btn-fullscreen {
        position: fixed; top: 20px; right: 20px;
        z-index: 20; width: 40px; height: 40px;
        background: rgba(255, 255, 255, 0.3); border-radius: 50%;
        border: 1px solid white; cursor: pointer;
        display: flex; justify-content: center; align-items: center; font-size: 20px;
        color: white;
      }
    </style>
  </head>
  <body>

    <div id="marco-app"></div>
    <button id="btn-fullscreen">⛶</button>

    <script>
      // Componente de chispas sutiles (se mantiene para dar vida a la RA)
      AFRAME.registerComponent('accelerometer-sparks', {
        init: function () {
          this.handleOrientation = this.handleOrientation.bind(this);
          window.addEventListener('deviceorientation', this.handleOrientation, true);
        },
        handleOrientation: function (event) {
          const maxTilt = 10; 
          const tiltX = Math.max(-maxTilt, Math.min(maxTilt, event.beta / 8));
          const tiltY = Math.max(-maxTilt, Math.min(maxTilt, event.gamma / 8));
          this.el.setAttribute('rotation', { x: -tiltX, y: tiltY, z: 0 });
        }
      });
    </script>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.000001; filterBeta: 0.0001; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights, antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="superFloating" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               geometry="primitive: plane; width: 1; height: 1"
               position="0 0 0"
               animation__move="property: position; to: 0 0 0.15; dur: 3000; easing: easeInOutSine; loop: true; dir: alternate; startEvents: fade-in-complete"
               animation__tilt="property: rotation; from: -6 -6 -3; to: 6 6 3; dur: 4500; easing: easeInOutSine; loop: true; dir: alternate; startEvents: fade-in-complete"></a-mixin>

      <a-mixin id="spark" 
               geometry="primitive: sphere; radius: 0.007"
               material="color: #FFF; shader: flat; transparent: true; opacity: 0.5;"
               animation__pulse="property: material.opacity; from: 0.1; to: 0.6; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0" id="target0">
         <a-entity id="content0">
           <a-image src="#img1" mixin="superFloating"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.4 0.4 0.02"></a-entity>
             <a-entity mixin="spark" position="-0.4 -0.4 0.08"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" id="target1">
         <a-entity id="content1">
           <a-image src="#img2" mixin="superFloating"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.4 0.4 0.08"></a-entity>
             <a-entity mixin="spark" position="-0.3 -0.5 0.02"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" id="target2">
         <a-entity id="content2">
           <a-image src="#img3" mixin="superFloating"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0.5 0 0.08"></a-entity>
             <a-entity mixin="spark" position="-0.5 0 0.02"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" id="target3">
         <a-entity id="content3">
           <a-image src="#img4" mixin="superFloating"></a-image>
           <a-entity accelerometer-sparks>
             <a-entity mixin="spark" position="0 0.6 0.02"></a-entity>
             <a-entity mixin="spark" position="0 -0.6 0.08"></a-entity>
           </a-entity>
         </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // Lógica de Pantalla Completa
      const btnFull = document.getElementById('btn-fullscreen');
      btnFull.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          btnFull.innerHTML = "❌";
        } else {
          document.exitFullscreen();
          btnFull.innerHTML = "⛶";
        }
      });

      // --- SCRIPT DE ESTABILIDAD EXTREMA + FADE SUAVE (RECOMENDACIÓN) ---
      const smoothingFactor = 0.01; // Mantenemos el suavizado elástico al mínimo (estabilidad total)

      for (let i = 0; i < 4; i++) {
        const target = document.querySelector(`#target${i}`);
        const content = document.querySelector(`#content${i}`);
        const image = content.querySelector('a-image');
        
        let currentPos = new THREE.Vector3();
        let isFound = false;

        // --- LÓGICA DE FADE IN/OUT (RECOMENDACIÓN) ---
        
        // Al encontrar el marcador: Elevación + Fade In suave
        target.addEventListener("targetFound", () => { 
          isFound = true; 
          // Anima Opacidad (0 a 1) y Posición Z (0 a 0.1)
          image.setAttribute('animation__fadeIn', {
            property: 'material.opacity', from: 0, to: 1, dur: 1000, easing: 'easeOutQuad'
          });
          image.setAttribute('animation__elevateIn', {
            property: 'position.z', from: 0, to: 0.1, dur: 1000, easing: 'easeOutQuad'
          });
          // Avisa a las otras animaciones (balanceo) que comiencen
          image.addEventListener('animationcomplete__fadeIn', () => {
            image.dispatchEvent(new Event('fade-in-complete'));
          }, {once: true});
        });

        // Al perder el marcador: Hundimiento + Fade Out suave (Elimina la brusquedad)
        target.addEventListener("targetLost", () => { 
          isFound = false; 
          // Anima Opacidad (1 a 0) y Posición Z (0.1 a 0)
          image.setAttribute('animation__fadeOut', {
            property: 'material.opacity', from: 1, to: 0, dur: 800, easing: 'easeInQuad'
          });
          image.setAttribute('animation__elevateOut', {
            property: 'position.z', from: 0.1, to: 0, dur: 800, easing: 'easeInQuad'
          });
          
          // CRUCIAL: Forzamos a que la entidad 'content' se quede visible unos ms más
          // para que la animación de Fade Out se complete antes de desaparecer del todo.
          setTimeout(() => {
            if (!isFound) { // Si no se ha vuelto a encontrar el marcador en ese tiempo
               // Podríamos ocultar la entidad aquí, pero el fade out ya lo hace invisible.
            }
          }, 800); // Mismo tiempo que dura la animación
        });

        // --- SCRIPT DE SUAVIZADO ELÁSTICO (CERO TEMBLEQUE) ---
        content.addEventListener('componentchanged', function (evt) {
          if (!isFound) return;
          if (evt.detail.name !== 'position' && evt.detail.name !== 'rotation') return;

          // Suavizado de posición (Lerp)
          currentPos.lerp(target.object3D.position, smoothingFactor);
          content.object3D.position.copy(currentPos);
          
          // Suavizado de rotación (Slerp)
          content.object3D.quaternion.slerp(target.object3D.quaternion, smoothingFactor);
        });
      }
    </script>
  </body>
</html>
