<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/Guille-y-Mary/refs/heads/main/favicon.ico">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

      #marco-app {
        position: fixed;
        top: 0; left: 0; 
        width: 100vw; 
        height: 100vh; 
        background-image: url('assets/canvas.png'); 
        background-position: center center; 
        background-repeat: no-repeat; 
        background-size: 100% 100%; 
        z-index: 10; 
        pointer-events: none; 
      }

      #btn-fullscreen {
        position: fixed; top: 20px; right: 20px;
        z-index: 20; width: 40px; height: 40px;
        background: rgba(255, 255, 255, 0.4); border-radius: 8px;
        border: 1px solid white; cursor: pointer;
        display: flex; justify-content: center; align-items: center; font-size: 20px;
      }
    </style>
  </head>
  <body>

    <div id="marco-app"></div>
    <button id="btn-fullscreen">⛶</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.00001; filterBeta: 0.0001; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights, antialias: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/imagen1.png">
        <img id="img2" src="assets/imagen2.png">
        <img id="img3" src="assets/imagen3.png">
        <img id="img4" src="assets/imagen4.png">
      </assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-mixin id="superFloating" 
               material="transparent: true; alphaTest: 0.5; shader: flat; opacity: 0"
               animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; easing: easeOutBack"
               animation__fade="property: material.opacity; from: 0; to: 1; dur: 800; easing: easeOutQuad"
               animation__move="property: position; to: 0 0 0.25; dur: 3000; easing: easeInOutSine; loop: true; dir: alternate"
               animation__tilt="property: rotation; from: -8 -8 -4; to: 8 8 4; dur: 4500; easing: easeInOutSine; loop: true; dir: alternate"></a-mixin>

      <a-entity mindar-image-target="targetIndex: 0" id="target0">
        <a-entity id="soft-wrapper0">
          <a-image id="content0" src="#img1" position="0 0 0.05" width="1" height="1" mixin="superFloating" scale="0 0 0"></a-image>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" id="target1">
        <a-entity id="soft-wrapper1">
          <a-image id="content1" src="#img2" position="0 0 0.05" width="1" height="1" mixin="superFloating" scale="0 0 0"></a-image>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" id="target2">
        <a-entity id="soft-wrapper2">
          <a-image id="content2" src="#img3" position="0 0 0.05" width="1" height="1" mixin="superFloating" scale="0 0 0"></a-image>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" id="target3">
        <a-entity id="soft-wrapper3">
          <a-image id="content3" src="#img4" position="0 0 0.05" width="1" height="1" mixin="superFloating" scale="0 0 0"></a-image>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const btnFull = document.getElementById('btn-fullscreen');
      btnFull.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          btnFull.innerHTML = "❌";
        } else {
          document.exitFullscreen();
          btnFull.innerHTML = "⛶";
        }
      });

      // LÓGICA DE SUAVIZADO INDEPENDIENTE (Sin cambios)
      const smoothingFactor = 0.05; 
      
      for (let i = 0; i < 4; i++) {
        const target = document.querySelector(`#target${i}`);
        const wrapper = document.querySelector(`#soft-wrapper${i}`);
        
        let currentPos = new THREE.Vector3();
        let currentQuat = new THREE.Quaternion();
        let isFound = false;

        target.addEventListener("targetFound", () => { 
          isFound = true; 
          currentPos.copy(target.object3D.position);
          currentQuat.copy(target.object3D.quaternion);
        });
        
        target.addEventListener("targetLost", () => { isFound = false; });

        const updateSmoothing = () => {
          if (isFound) {
            currentPos.lerp(target.object3D.position, smoothingFactor);
            currentQuat.slerp(target.object3D.quaternion, smoothingFactor);

            wrapper.object3D.position.copy(currentPos);
            wrapper.object3D.quaternion.copy(currentQuat);
          }
          requestAnimationFrame(updateSmoothing);
        };
        
        updateSmoothing();
      }
    </script>
  </body>
</html>
